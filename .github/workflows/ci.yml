name: ci

on:
  push:
    branches:
      - main
    # Skip docs-only pushes.
    paths-ignore:
      - README.md
  pull_request:
    # Skip docs-only pull requests.
    paths-ignore:
      - README.md

jobs:
  # Fast validation gate for Terraform syntax/format/provider wiring.
  terraform:
    name: Terraform Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

  # End-to-end CI verification in ephemeral Minikube (deploy + smoke test).
  # Runs on GitHub-hosted runner only, does not deploy to developer local Minikube.
  deploy-and-test:
    name: Deploy to Minikube + Smoke Test
    runs-on: ubuntu-latest
    # Only run deploy smoke tests after Terraform static checks pass.
    needs: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup minikube
        uses: medyagh/setup-minikube@latest

      - name: Bootstrap Minikube (Terraform)
        run: |
          # Use the bootstrap stack to create the local cluster used in CI.
          cd terraform/bootstrap
          terraform init
          terraform apply -auto-approve \
            -var="minikube_profile=task-k8s" \
            -var="cpus=2" \
            -var="memory=2048" \
            -var="driver=docker"

      - name: Build app image into Minikube
        run: |
          # Build directly in Minikube's image store so pods can pull locally.
          minikube -p task-k8s image build -t shadibdair/pod-meta-app:latest ./app

      - name: Deploy apps + Ingress (Terraform)
        run: |
          # Main stack creates namespace, deployments, services and ingress.
          cd terraform
          terraform init
          terraform apply -auto-approve -var-file=environments/ci.tfvars

      - name: Wait for deployments
        run: |
          set -euo pipefail

          # Fail fast per app and print pod diagnostics for easier debugging.
          for d in app1 app2 podinfo; do
            echo "Waiting for deployment/${d} to become ready..."
            if ! kubectl -n candidate-apps rollout status "deploy/${d}" --timeout=180s; then
              echo "Deployment/${d} rollout failed; dumping diagnostics..."
              kubectl -n candidate-apps get pods -o wide -l "app=${d}" || true
              kubectl -n candidate-apps describe pod -l "app=${d}" || true
              exit 1
            fi
          done

      - name: Port-forward ingress and run smoke tests
        run: |
          set -euo pipefail
          kubectl -n ingress-nginx get svc ingress-nginx-controller

          # Route local CI traffic through ingress-nginx service.
          kubectl -n ingress-nginx port-forward svc/ingress-nginx-controller 8080:80 > /tmp/port-forward.log 2>&1 &
          PF_PID=$!
          trap "kill ${PF_PID} || true" EXIT

          # Allow ingress controller to accept connections
          sleep 5
          SMOKE_BASE_URL="http://127.0.0.1:8080" ./scripts/smoke-test.sh

  # Separate container build check to ensure Dockerfile stays valid.
  app-build:
    name: App Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app image
        run: docker build -t pod-meta-app:ci ./app